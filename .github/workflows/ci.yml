name: ci

# Lint, type-check, and test the viroc compiler. Runs the same three gates as
# the local toolchain (ruff, pyright, pytest) on every pull request and on main.
# The bake-off workflow validates the throwaway experiments/ tree separately.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.6.14"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (pyright)
        run: uv run pyright
      - name: Test (pytest)
        run: uv run pytest -q
