scene_plan_version: '0.1'
video:
  id: viroc-codebase
  title: From a Topic to a Verified Video with VIROC
  fps: 30
  resolution:
    width: 1920
    height: 1080
  duration_target: 40
entities:
- id: author
  label: User
  type: user
- id: repo_context
  label: Repo context
  type: data_source
- id: doc_set
  label: Document set
  type: data_source
- id: topic
  label: Topic brief
  type: data_source
- id: planner
  label: Guided planner
  type: service
- id: script
  label: Script
  type: intermediate
- id: scene_plan
  label: Scene plan
  type: intermediate
- id: outline
  label: Outline
  type: intermediate
- id: storyboard
  label: Editable VidIR
  type: intermediate
- id: checks
  label: VIR diagnostics
  type: service
- id: repaired
  label: Repaired VidIR
  type: intermediate
- id: review
  label: Review surface
  type: data_source
- id: scene_cards
  label: Scene cards
  type: intermediate
- id: script_review
  label: Script review
  type: intermediate
- id: concrete_ir
  label: Concrete IR
  type: intermediate
- id: manim_source
  label: Manim source
  type: intermediate
- id: html_source
  label: HTML source
  type: intermediate
- id: remotion_source
  label: Remotion source
  type: intermediate
- id: html_path
  label: HTML path
  type: service
- id: remotion_path
  label: Remotion path
  type: service
- id: source_hashes
  label: Source hashes
  type: storage
- id: build_manifest
  label: build.json
  type: storage
scenes:
- id: concept_input
  title: Concept input
  goal: 'Start from a concept: a repo, a document set, and a topic brief.'
  grammar: showcase
  duration: 5s
  nodes:
  - repo_context
  - doc_set
  - topic
  - author
  edges:
  - from: repo_context
    to: doc_set
    kind: flow
  - from: doc_set
    to: topic
    kind: flow
  - from: topic
    to: author
    kind: flow
  narration: 'Start from a concept: a repo, a document set, and a topic brief, not renderer code.'
- id: script_and_scene_plan
  title: Script and scene plan
  goal: The guided planner derives a script, a scene plan, and an outline.
  grammar: showcase
  duration: 6s
  nodes:
  - planner
  - script
  - scene_plan
  - outline
  edges:
  - from: planner
    to: script
    kind: split
  - from: planner
    to: scene_plan
    kind: split
  - from: planner
    to: outline
    kind: split
  narration: The guided planner derives a script, a scene plan, and an outline before any IR exists.
- id: editable_vidir
  title: Editable VidIR
  goal: The approved outline becomes editable VidIR the user owns.
  grammar: showcase
  duration: 5s
  nodes:
  - outline
  - storyboard
  - author
  edges:
  - from: outline
    to: storyboard
    kind: flow
  - from: storyboard
    to: author
    kind: flow
  narration: The approved outline becomes editable VidIR the user and agents refine.
- id: validate_repair
  title: Validate and repair
  goal: viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render.
  grammar: showcase
  duration: 6s
  nodes:
  - storyboard
  - checks
  - repaired
  edges:
  - from: storyboard
    to: checks
    kind: flow
  - from: checks
    to: repaired
    kind: flow
  narration: viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render.
- id: storyboard_review
  title: Storyboard review
  goal: The review surface shows scene cards and the script before final render.
  grammar: showcase
  duration: 6s
  nodes:
  - review
  - scene_cards
  - script_review
  - author
  edges:
  - from: review
    to: scene_cards
    kind: flow
  - from: scene_cards
    to: script_review
    kind: flow
  - from: script_review
    to: author
    kind: flow
  narration: The review surface shows scene cards and the script as an inspectable artifact before final render.
- id: compile_fanout
  title: Compile fan-out
  goal: One Concrete IR compiles deterministically to Manim, HTML, and Remotion source.
  grammar: showcase
  duration: 6s
  nodes:
  - concrete_ir
  - manim_source
  - html_source
  - remotion_source
  edges:
  - from: concrete_ir
    to: manim_source
    kind: split
  - from: concrete_ir
    to: html_source
    kind: split
  - from: concrete_ir
    to: remotion_source
    kind: split
  narration: One resolved Concrete IR compiles deterministically to Manim, HTML, and Remotion source.
- id: parity_proof
  title: Parity proof
  goal: Backends are compared and source hashes plus build.json close the reproducibility proof.
  grammar: showcase
  duration: 6s
  nodes:
  - html_path
  - source_hashes
  - remotion_path
  - build_manifest
  edges:
  - from: html_path
    to: source_hashes
    kind: compare
  - from: remotion_path
    to: build_manifest
    kind: compare
  narration: Backend paths compared side by side; source hashes and build.json close the proof.
