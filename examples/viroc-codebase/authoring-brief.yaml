  body: []
scene_seeds:
- title: Title
  goal: Open on the product promise.
  narration: From a topic to a verified, portable video.
  nodes:
  - brand_title
  - brand_claim
  duration: 4s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis: []
  id: title_card
- title: Concept input
  goal: 'Start from a concept: a repo, a document set, and a topic brief.'
  narration: 'Start from a concept: a repo, a document set, and a topic brief, not renderer code.'
  nodes:
  - repo_context
  - doc_set
  - topic
  - author
  duration: 5s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis: []
  id: concept_input
- title: Script and scene plan
  goal: The guided planner derives a script, a scene plan, and an outline.
  narration: The guided planner derives a script, a scene plan, and an outline before any IR exists.
  nodes:
  - planner
  - script
  - scene_plan
  - outline
  duration: 6s
  grammar: showcase
  edges:
  - from: planner
    to: script
    kind: split
  - from: planner
    to: scene_plan
    kind: split
  - from: planner
    to: outline
    kind: split
  edge_kind: flow
  emphasis: []
  id: script_and_scene_plan
- title: Editable VidIR
  goal: The approved outline becomes editable VidIR the user owns.
  narration: The approved outline becomes editable VidIR the user and agents refine.
  nodes:
  - outline
  - storyboard
  - author
  duration: 5s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis:
  - storyboard
  id: editable_vidir
- title: Validate and repair
  goal: viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render.
  narration: viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render.
  nodes:
  - storyboard
  - checks
  - repaired
  duration: 6s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis:
  - checks
  id: validate_repair
- title: Storyboard review
  goal: The review surface shows scene cards and the script before final render.
  narration: The review surface shows scene cards and the script as an inspectable artifact before final render.
  nodes:
  - review
  - scene_cards
  - script_review
  - author
  duration: 6s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis: []
  id: storyboard_review
- title: Compile fan-out
  goal: One Concrete IR compiles deterministically to Manim, HTML, and Remotion source.
  narration: One resolved Concrete IR compiles deterministically to Manim, HTML, and Remotion source.
  nodes:
  - concrete_ir
  - manim_source
  - html_source
  - remotion_source
  duration: 6s
  grammar: showcase
  edges:
  - from: concrete_ir
    to: manim_source
    kind: split
  - from: concrete_ir
    to: html_source
    kind: split
  - from: concrete_ir
    to: remotion_source
    kind: split
  edge_kind: flow
  emphasis:
  - concrete_ir
  id: compile_fanout
- title: Parity proof
  goal: Backends are compared and source hashes plus build.json close the reproducibility proof.
  narration: Backend paths compared side by side; source hashes and build.json close the proof.
  nodes:
  - html_path
  - source_hashes
  - remotion_path
  - build_manifest
  duration: 6s
  grammar: showcase
  edges:
  - from: html_path
    to: source_hashes
    kind: compare
  - from: remotion_path
    to: build_manifest
    kind: compare
  edge_kind: flow
  emphasis:
  - source_hashes
  id: parity_proof
- title: Closing
  goal: Close on the guarantees.
  narration: Reviewable, testable, reproducible — VidIR is the source of truth.
  nodes:
  - closing_claim
  duration: 4s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis: []
  id: closing
context_items:
- kind: note
  label: note
  excerpt: VIROC compiles a typed VidIR to Manim, HTML, and Remotion through a pluggable adapter registry.
- kind: note
  label: note
  excerpt: The guided flow is ingest -> plan -> critique -> compile -> render, with VidIR as the only editable intermediate.
notes:
- VIROC compiles a typed VidIR to Manim, HTML, and Remotion through a pluggable adapter registry.
- The guided flow is ingest -> plan -> critique -> compile -> render, with VidIR as the only editable intermediate.
