vidir_version: "0.1"
video:
  id: "viroc-codebase"
  title: "From a Topic to a Verified Video with VIROC"
  resolution: { width: 1920, height: 1080 }
  fps: 30
  duration_target: 40

entities:
  # 1. Concept input the guided flow starts from.
  - { id: author, label: "User", type: user }
  - { id: repo_context, label: "Repo context", type: data_source }
  - { id: doc_set, label: "Document set", type: data_source }
  - { id: topic, label: "Topic brief", type: data_source }
  # 2. Script and scene-plan authoring stage.
  - { id: planner, label: "Guided planner", type: service }
  - { id: script, label: "Script", type: intermediate }
  - { id: scene_plan, label: "Scene plan", type: intermediate }
  - { id: outline, label: "Outline", type: intermediate }
  # 3-4. Editable VidIR and validation/repair.
  - { id: storyboard, label: "Editable VidIR", type: intermediate }
  - { id: checks, label: "VIR diagnostics", type: service }
  - { id: repaired, label: "Repaired VidIR", type: intermediate }
  # 5. Review surface before render.
  - { id: review, label: "Review surface", type: data_source }
  - { id: scene_cards, label: "Scene cards", type: intermediate }
  - { id: script_review, label: "Script review", type: intermediate }
  # 6. Deterministic compile fan-out.
  - { id: concrete_ir, label: "Concrete IR", type: intermediate }
  - { id: manim_source, label: "Manim source", type: intermediate }
  - { id: html_source, label: "HTML source", type: intermediate }
  - { id: remotion_source, label: "Remotion source", type: intermediate }
  # 7. Backend parity and reproducibility proof.
  - { id: html_path, label: "HTML path", type: service }
  - { id: remotion_path, label: "Remotion path", type: service }
  - { id: source_hashes, label: "Source hashes", type: storage }
  - { id: build_manifest, label: "build.json", type: storage }

scenes:
  - id: concept_input
    grammar: showcase
    duration: 5s
    nodes: [repo_context, doc_set, topic, author]
    narration: "Start from a concept: a repo, a document set, and a topic brief, not renderer code."
  - id: script_and_scene_plan
    grammar: showcase
    duration: 6s
    nodes: [planner, script, scene_plan, outline]
    edges:
      - { from: planner, to: script, kind: split }
      - { from: planner, to: scene_plan, kind: split }
      - { from: planner, to: outline, kind: split }
    narration: "The guided planner derives a script, a scene plan, and an outline before any IR exists."
  - id: editable_vidir
    grammar: showcase
    duration: 5s
    nodes: [outline, storyboard, author]
    narration: "The approved outline becomes editable VidIR the user and agents refine."
  - id: validate_repair
    grammar: showcase
    duration: 6s
    nodes: [storyboard, checks, repaired]
    narration: "viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render."
  - id: storyboard_review
    grammar: showcase
    duration: 6s
    nodes: [review, scene_cards, script_review, author]
    narration: "The review surface shows scene cards and the script as an inspectable artifact before final render."
  - id: compile_fanout
    grammar: showcase
    duration: 6s
    nodes: [concrete_ir, manim_source, html_source, remotion_source]
    edges:
      - { from: concrete_ir, to: manim_source, kind: split }
      - { from: concrete_ir, to: html_source, kind: split }
      - { from: concrete_ir, to: remotion_source, kind: split }
    narration: "One resolved Concrete IR compiles deterministically to Manim, HTML, and Remotion source."
  - id: parity_proof
    grammar: showcase
    duration: 6s
    nodes: [html_path, source_hashes, remotion_path, build_manifest]
    edges:
      - { from: html_path, to: source_hashes, kind: compare }
      - { from: remotion_path, to: build_manifest, kind: compare }
    narration: "Backend paths compared side by side; source hashes and build.json close the proof."

validation:
  required_entities:
    [author, repo_context, doc_set, topic, planner, script, scene_plan, outline, storyboard, checks, repaired, review, scene_cards, script_review, concrete_ir, manim_source, html_source, remotion_source, html_path, remotion_path, source_hashes, build_manifest]
  checks: [schema, layout, timing]
