vidir_version: '0.1'
video:
  id: viroc-codebase
  title: From a Topic to a Verified Video with VIROC
  fps: 30
  resolution:
    width: 1920
    height: 1080
  duration_target: 40
entities:
- id: author
  label: User
  type: user
  detail: you, the author
  body: []
- id: repo_context
  label: Repo context
  type: data_source
  detail: git + symbols
  body: []
- id: doc_set
  label: Document set
  type: data_source
  detail: design + overview
  body: []
- id: topic
  label: Topic brief
  type: data_source
  detail: audience + objective
  body: []
- id: planner
  label: Guided planner
  type: service
  detail: topic to plan
  body: []
- id: script
  label: Script
  type: intermediate
  detail: what is said
  body: []
- id: scene_plan
  label: Scene plan
  type: intermediate
  detail: what is shown
  body: []
- id: outline
  label: Outline
  type: intermediate
  detail: approved structure
  body: []
- id: storyboard
  label: Editable VidIR
  type: intermediate
  detail: the only input
  body:
  - 'vidir_version: 0.1'
  - 'scenes: 7  entities: 22'
- id: checks
  label: VIR diagnostics
  type: service
  detail: typed errors
  body:
  - 'error VIR1002:'
  - unknown entity ref
  - 'help: did you mean ...'
- id: repaired
  label: Repaired VidIR
  type: intermediate
  detail: clean to compile
  body: []
- id: review
  label: Review surface
  type: data_source
  detail: inspect first
  body: []
- id: scene_cards
  label: Scene cards
  type: intermediate
  detail: per-scene
  body: []
- id: script_review
  label: Script review
  type: intermediate
  detail: read before render
  body: []
- id: concrete_ir
  label: Concrete IR
  type: intermediate
  detail: resolved + timed
  body:
  - objects + boxes
  - keyframes + captions
- id: manim_source
  label: Manim source
  type: intermediate
  detail: scene.py
  body: []
- id: html_source
  label: HTML source
  type: intermediate
  detail: scene.html
  body: []
- id: remotion_source
  label: Remotion source
  type: intermediate
  detail: Composition.tsx
  body: []
- id: html_path
  label: HTML path
  type: service
  detail: browser render
  body: []
- id: remotion_path
  label: Remotion path
  type: service
  detail: react render
  body: []
- id: source_hashes
  label: Source hashes
  type: storage
  detail: byte-stable
  body:
  - manim    sha256
  - html     sha256
  - remotion sha256
- id: build_manifest
  label: build.json
  type: storage
  detail: reproducibility
  body:
  - renderer + phash
  - source_hash + assets
- id: brand_title
  label: VIROC
  type: heading
  body: []
- id: brand_claim
  label: Typed storyboards. Validated before they render.
  type: statement
  body: []
- id: closing_claim
  label: Reviewable in a PR. Testable in CI. Reproducible by build.
  type: statement
  body: []
scenes:
- id: title_card
  grammar: showcase
  duration: 4s
  nodes:
  - brand_title
  - brand_claim
  edges:
  - from: brand_title
    to: brand_claim
    kind: flow
  beats: []
  narration: From a topic to a verified, portable video.
- id: concept_input
  grammar: showcase
  duration: 5s
  nodes:
  - repo_context
  - doc_set
  - topic
  - author
  edges:
  - from: repo_context
    to: doc_set
    kind: flow
  - from: doc_set
    to: topic
    kind: flow
  - from: topic
    to: author
    kind: flow
  beats: []
  narration: 'Start from a concept: a repo, a document set, and a topic brief, not renderer code.'
- id: script_and_scene_plan
  grammar: showcase
  duration: 6s
  nodes:
  - planner
  - script
  - scene_plan
  - outline
  edges:
  - from: planner
    to: script
    kind: split
  - from: planner
    to: scene_plan
    kind: split
  - from: planner
    to: outline
    kind: split
  beats: []
  narration: The guided planner derives a script, a scene plan, and an outline before any IR exists.
- id: editable_vidir
  grammar: showcase
  duration: 5s
  nodes:
  - outline
  - storyboard
  - author
  edges:
  - from: outline
    to: storyboard
    kind: flow
  - from: storyboard
    to: author
    kind: flow
  beats:
  - id: editable_vidir-emphasis
    at: 0s
    duration: 5s
    narration: The approved outline becomes editable VidIR the user and agents refine.
    emphasis:
    - storyboard
  narration: The approved outline becomes editable VidIR the user and agents refine.
- id: validate_repair
  grammar: showcase
  duration: 6s
  nodes:
  - storyboard
  - checks
  - repaired
  edges:
  - from: storyboard
    to: checks
    kind: flow
  - from: checks
    to: repaired
    kind: flow
  beats:
  - id: validate_repair-emphasis
    at: 0s
    duration: 6s
    narration: viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render.
    emphasis:
    - checks
  narration: viroc check surfaces typed VIR diagnostics so the storyboard is repaired before render.
- id: storyboard_review
  grammar: showcase
  duration: 6s
  nodes:
  - review
  - scene_cards
  - script_review
  - author
  edges:
  - from: review
    to: scene_cards
    kind: flow
  - from: scene_cards
    to: script_review
    kind: flow
  - from: script_review
    to: author
    kind: flow
  beats: []
  narration: The review surface shows scene cards and the script as an inspectable artifact before final render.
- id: compile_fanout
  grammar: showcase
  duration: 6s
  nodes:
  - concrete_ir
  - manim_source
  - html_source
  - remotion_source
  edges:
  - from: concrete_ir
    to: manim_source
    kind: split
  - from: concrete_ir
    to: html_source
    kind: split
  - from: concrete_ir
    to: remotion_source
    kind: split
  beats:
  - id: compile_fanout-emphasis
    at: 0s
    duration: 6s
    narration: One resolved Concrete IR compiles deterministically to Manim, HTML, and Remotion source.
    emphasis:
    - concrete_ir
  narration: One resolved Concrete IR compiles deterministically to Manim, HTML, and Remotion source.
- id: parity_proof
  grammar: showcase
  duration: 6s
  nodes:
  - html_path
  - source_hashes
  - remotion_path
  - build_manifest
  edges:
  - from: html_path
    to: source_hashes
    kind: compare
  - from: remotion_path
    to: build_manifest
    kind: compare
  beats:
  - id: parity_proof-emphasis
    at: 0s
    duration: 6s
    narration: Backend paths compared side by side; source hashes and build.json close the proof.
    emphasis:
    - source_hashes
  narration: Backend paths compared side by side; source hashes and build.json close the proof.
- id: closing
  grammar: showcase
  duration: 4s
  nodes:
  - closing_claim
  edges: []
  beats: []
  narration: Reviewable, testable, reproducible — VidIR is the source of truth.
validation:
  required_entities:
  - author
  - repo_context
  - doc_set
  - topic
  - planner
  - script
  - scene_plan
  - outline
  - storyboard
  - checks
  - repaired
  - review
  - scene_cards
  - script_review
  - concrete_ir
  - manim_source
  - html_source
  - remotion_source
  - html_path
  - remotion_path
  - source_hashes
  - build_manifest
  - brand_title
  - brand_claim
  - closing_claim
  checks:
  - schema
  - layout
  - timing
