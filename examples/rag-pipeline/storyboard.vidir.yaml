vidir_version: "0.1"
video:
  id: "rag-overview"
  title: "How Retrieval-Augmented Generation Works"
  resolution: { width: 1920, height: 1080 }
  fps: 30
  duration_target: 34

entities:
  - { id: query, label: "User question", type: data_source }
  - { id: documents, label: "Documents", type: data_source }
  - { id: chunks, label: "Chunks", type: intermediate }
  - { id: embedder, label: "Embedding model", type: model }
  - { id: vector_db, label: "Vector store", type: storage }
  - { id: retrieved_context, label: "Retrieved context", type: intermediate }
  - { id: llm, label: "LLM", type: model }
  - { id: bare_answer, label: "Bare prompt answer", type: data_source }
  - { id: grounded_answer, label: "Grounded answer", type: data_source }

scenes:
  - id: problem_setup
    grammar: pipeline
    duration: 6s
    nodes: [query, llm, documents]
    edges:
      - { from: query, to: llm, kind: flow }
    narration: "A user question reaches the model, but the answer still needs the document corpus."
  - id: indexing_path
    grammar: pipeline
    duration: 7s
    nodes: [documents, chunks, embedder, vector_db]
    edges:
      - { from: documents, to: chunks, kind: split }
      - { from: chunks, to: embedder, kind: transform }
      - { from: embedder, to: vector_db, kind: store }
    narration: "VIROC stages the indexing path: documents split into chunks, become embeddings, and land in the vector store."
  - id: retrieval_path
    grammar: pipeline
    duration: 6s
    nodes: [query, vector_db, retrieved_context]
    edges:
      - { from: query, to: vector_db, kind: flow }
      - { from: vector_db, to: retrieved_context, kind: flow }
    narration: "At query time, the same question probes the vector store and pulls back the nearest context."
  - id: answer_synthesis
    grammar: pipeline
    duration: 7s
    nodes: [query, retrieved_context, llm, grounded_answer]
    edges:
      - { from: query, to: retrieved_context, kind: flow }
      - { from: retrieved_context, to: llm, kind: merge }
      - { from: llm, to: grounded_answer, kind: transform }
    narration: "The retrieved context carries the question into synthesis, and the LLM turns that grounded path into an answer."
  - id: payoff
    grammar: pipeline
    duration: 8s
    nodes: [bare_answer, retrieved_context, grounded_answer]
    edges:
      - { from: bare_answer, to: retrieved_context, kind: compare }
      - { from: retrieved_context, to: grounded_answer, kind: merge }
    narration: "The payoff is evidence: bare prompting falls short, while retrieved context carries the answer to a grounded result."

validation:
  required_entities:
    [query, documents, chunks, embedder, vector_db, retrieved_context, llm, bare_answer, grounded_answer]
  checks: [schema, layout, timing]
