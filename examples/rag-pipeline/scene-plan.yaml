scene_plan_version: '0.1'
video:
  id: rag-overview
  title: How Retrieval-Augmented Generation Works
  fps: 30
  resolution:
    width: 1920
    height: 1080
  duration_target: 34
entities:
- id: query
  label: User question
  type: data_source
- id: documents
  label: Documents
  type: data_source
- id: chunks
  label: Chunks
  type: intermediate
- id: embedder
  label: Embedding model
  type: model
- id: vector_db
  label: Vector store
  type: storage
- id: retrieved_context
  label: Retrieved context
  type: intermediate
- id: llm
  label: LLM
  type: model
- id: bare_answer
  label: Bare prompt answer
  type: data_source
- id: grounded_answer
  label: Grounded answer
  type: data_source
scenes:
- id: problem_setup
  title: The grounding gap
  goal: 'Set up the problem: a bare model answer still needs the document corpus.'
  grammar: pipeline
  duration: 6s
  nodes:
  - query
  - llm
  - documents
  edges:
  - from: query
    to: llm
    kind: flow
  narration: A user question reaches the model, but the answer still needs the document corpus.
- id: indexing_path
  title: Index the corpus
  goal: Stage the offline indexing path from documents to a vector store.
  grammar: pipeline
  duration: 7s
  nodes:
  - documents
  - chunks
  - embedder
  - vector_db
  edges:
  - from: documents
    to: chunks
    kind: split
  - from: chunks
    to: embedder
    kind: transform
  - from: embedder
    to: vector_db
    kind: store
  narration: 'VIROC stages the indexing path: documents split into chunks, become embeddings, and land in the vector store.'
- id: retrieval_path
  title: Retrieve at query time
  goal: Probe the vector store with the question and pull back the nearest context.
  grammar: pipeline
  duration: 6s
  nodes:
  - query
  - vector_db
  - retrieved_context
  edges:
  - from: query
    to: vector_db
    kind: flow
  - from: vector_db
    to: retrieved_context
    kind: flow
  narration: At query time, the same question probes the vector store and pulls back the nearest context.
- id: answer_synthesis
  title: Synthesize a grounded answer
  goal: Carry the question and retrieved context into the model for synthesis.
  grammar: pipeline
  duration: 7s
  nodes:
  - query
  - retrieved_context
  - llm
  - grounded_answer
  edges:
  - from: query
    to: retrieved_context
    kind: flow
  - from: retrieved_context
    to: llm
    kind: merge
  - from: llm
    to: grounded_answer
    kind: transform
  narration: The retrieved context carries the question into synthesis, and the LLM turns that grounded path into an answer.
- id: payoff
  title: Bare versus grounded
  goal: Contrast the bare-prompt answer with the grounded result.
  grammar: pipeline
  duration: 8s
  nodes:
  - bare_answer
  - retrieved_context
  - grounded_answer
  edges:
  - from: bare_answer
    to: retrieved_context
    kind: compare
  - from: retrieved_context
    to: grounded_answer
    kind: merge
  narration: 'The payoff is evidence: bare prompting falls short, while retrieved context carries the answer to a grounded result.'
