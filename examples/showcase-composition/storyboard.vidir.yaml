vidir_version: '0.1'
video:
  id: showcase-composition
  title: VIROC Showcase Grammar — Composition Primitives
  fps: 30
  resolution:
    width: 1920
    height: 1080
  duration_target: 18
entities:
- id: brand_title
  label: Showcase grammar
  type: heading
  body: []
- id: brand_claim
  label: Panels, code cards, callouts, evidence — composed, not rowed.
  type: statement
  body: []
- id: input_panel
  label: Authored input
  type: data_source
  detail: viroc.yaml + vidir
  body: []
- id: ir_card
  label: Semantic IR
  type: intermediate
  detail: the editable IR
  body:
  - 'scenes: [...]'
  - 'entities: [...]'
- id: author_note
  label: Author note
  type: user
  detail: human in the loop
  body: []
- id: proof_block
  label: Source hashes
  type: storage
  detail: byte-stable
  body:
  - manim    sha256
  - html     sha256
  - remotion sha256
- id: resolver
  label: Resolver
  type: service
  detail: layout + time
  body: []
- id: concrete_ir
  label: Concrete IR
  type: intermediate
  detail: resolved + placed
  body:
  - objects + boxes
  - keyframes
- id: review_surface
  label: Review surface
  type: data_source
  detail: before render
  body: []
- id: build_manifest
  label: build.json
  type: storage
  detail: reproducibility
  body:
  - renderer + phash
  - source_hash
- id: html_path
  label: HTML path
  type: service
  detail: browser render
  body: []
- id: remotion_path
  label: Remotion path
  type: service
  detail: react render
  body: []
- id: html_source
  label: scene.html
  type: intermediate
  detail: self-contained
  body:
  - positioned divs
  - inline styles
- id: remotion_source
  label: Composition.tsx
  type: intermediate
  detail: generated project
  body:
  - <AbsoluteFill>
  - <Sequence>
scenes:
- id: title_card
  grammar: showcase
  duration: 4s
  nodes:
  - brand_title
  - brand_claim
  edges:
  - from: brand_title
    to: brand_claim
    kind: flow
  beats: []
  narration: The showcase grammar composes content, not just boxes.
- id: primitives
  grammar: showcase
  duration: 6s
  nodes:
  - input_panel
  - ir_card
  - author_note
  - proof_block
  edges:
  - from: input_panel
    to: ir_card
    kind: flow
  - from: ir_card
    to: author_note
    kind: flow
  - from: author_note
    to: proof_block
    kind: flow
  beats:
  - id: primitives-emphasis
    at: 0s
    duration: 6s
    narration: Showcase composes panels, code cards, callouts, and evidence blocks in a non-row grid.
    emphasis:
    - ir_card
  narration: Showcase composes panels, code cards, callouts, and evidence blocks in a non-row grid.
- id: fanout
  grammar: showcase
  duration: 6s
  nodes:
  - resolver
  - concrete_ir
  - review_surface
  - build_manifest
  edges:
  - from: resolver
    to: concrete_ir
    kind: split
  - from: resolver
    to: review_surface
    kind: split
  - from: resolver
    to: build_manifest
    kind: split
  beats:
  - id: fanout-emphasis
    at: 0s
    duration: 6s
    narration: One resolver fans out into Concrete IR, a review surface, and a build manifest.
    emphasis:
    - concrete_ir
  narration: One resolver fans out into Concrete IR, a review surface, and a build manifest.
- id: comparison
  grammar: showcase
  duration: 6s
  nodes:
  - html_path
  - remotion_path
  - html_source
  - remotion_source
  edges:
  - from: html_path
    to: html_source
    kind: compare
  - from: remotion_path
    to: remotion_source
    kind: compare
  beats: []
  narration: 'Two portable backend paths compared side by side: HTML versus Remotion source.'
validation:
  required_entities:
  - brand_title
  - brand_claim
  - input_panel
  - ir_card
  - author_note
  - proof_block
  - resolver
  - concrete_ir
  - review_surface
  - build_manifest
  - html_path
  - remotion_path
  - html_source
  - remotion_source
  checks:
  - schema
  - layout
  - timing
