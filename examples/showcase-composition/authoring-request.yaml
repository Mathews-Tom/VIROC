request_version: '0.1'
project:
  path: .
  id: showcase-composition
  title: VIROC Showcase Grammar — Composition Primitives
  duration_target: 18
  default_backend: static_storyboard
source:
  kind: topic
  title: VIROC Showcase Grammar — Composition Primitives
  prompt: Demonstrate the showcase grammar's panel, code-card, callout, evidence-block, fan-out, and comparison compositions.
  audience: VIROC authors exploring richer composition
  objective: Prove the showcase grammar's non-row compositions and above-floor primitives
entities:
- id: input_panel
  label: Authored input
  type: data_source
- id: ir_card
  label: Semantic IR
  type: intermediate
- id: author_note
  label: Author note
  type: user
- id: proof_block
  label: Source hashes
  type: storage
- id: resolver
  label: Resolver
  type: service
- id: concrete_ir
  label: Concrete IR
  type: intermediate
- id: review_surface
  label: Review surface
  type: data_source
- id: build_manifest
  label: build.json
  type: storage
- id: html_path
  label: HTML path
  type: service
- id: remotion_path
  label: Remotion path
  type: service
- id: html_source
  label: scene.html
  type: intermediate
- id: remotion_source
  label: Composition.tsx
  type: intermediate
scene_seeds:
- id: primitives
  title: Composition primitives
  goal: Show one of each composition kind in a non-row 2x2 grid.
  narration: Showcase composes panels, code cards, callouts, and evidence blocks in a non-row grid.
  nodes:
  - input_panel
  - ir_card
  - author_note
  - proof_block
  duration: 6s
  grammar: showcase
- id: fanout
  title: Fan-out
  goal: Fan one resolver service out to three artifacts.
  narration: One resolver fans out into Concrete IR, a review surface, and a build manifest.
  nodes:
  - resolver
  - concrete_ir
  - review_surface
  - build_manifest
  duration: 6s
  grammar: showcase
  edges:
  - from: resolver
    to: concrete_ir
    kind: split
  - from: resolver
    to: review_surface
    kind: split
  - from: resolver
    to: build_manifest
    kind: split
- id: comparison
  title: Comparison
  goal: Place two portable backend paths side by side.
  narration: 'Two portable backend paths compared side by side: HTML versus Remotion source.'
  nodes:
  - html_path
  - remotion_path
  - html_source
  - remotion_source
  duration: 6s
  grammar: showcase
  edges:
  - from: html_path
    to: html_source
    kind: compare
  - from: remotion_path
    to: remotion_source
    kind: compare
