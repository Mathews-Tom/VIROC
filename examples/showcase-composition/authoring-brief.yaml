brief_version: '0.1'
project:
  id: showcase-composition
  title: VIROC Showcase Grammar — Composition Primitives
  duration_target: 18
  default_backend: static_storyboard
source:
  kind: topic
  title: VIROC Showcase Grammar — Composition Primitives
  prompt: Demonstrate the showcase grammar's panel, code-card, callout, evidence-block, fan-out, and comparison compositions.
  audience: VIROC authors exploring richer composition
  objective: Prove the showcase grammar's non-row compositions and above-floor primitives
entities:
- id: brand_title
  label: Showcase grammar
  type: heading
  body: []
- id: brand_claim
  label: Panels, code cards, callouts, evidence — composed, not rowed.
  type: statement
  body: []
- id: input_panel
  label: Authored input
  type: data_source
  detail: viroc.yaml + vidir
  body: []
- id: ir_card
  label: Semantic IR
  type: intermediate
  detail: the editable IR
  body:
  - 'scenes: [...]'
  - 'entities: [...]'
- id: author_note
  label: Author note
  type: user
  detail: human in the loop
  body: []
- id: proof_block
  label: Source hashes
  type: storage
  detail: byte-stable
  body:
  - manim    sha256
  - html     sha256
  - remotion sha256
- id: resolver
  label: Resolver
  type: service
  detail: layout + time
  body: []
- id: concrete_ir
  label: Concrete IR
  type: intermediate
  detail: resolved + placed
  body:
  - objects + boxes
  - keyframes
- id: review_surface
  label: Review surface
  type: data_source
  detail: before render
  body: []
- id: build_manifest
  label: build.json
  type: storage
  detail: reproducibility
  body:
  - renderer + phash
  - source_hash
- id: html_path
  label: HTML path
  type: service
  detail: browser render
  body: []
- id: remotion_path
  label: Remotion path
  type: service
  detail: react render
  body: []
- id: html_source
  label: scene.html
  type: intermediate
  detail: self-contained
  body:
  - positioned divs
  - inline styles
- id: remotion_source
  label: Composition.tsx
  type: intermediate
  detail: generated project
  body:
  - <AbsoluteFill>
  - <Sequence>
scene_seeds:
- title: Showcase title
  goal: Open on the grammar's promise.
  narration: The showcase grammar composes content, not just boxes.
  nodes:
  - brand_title
  - brand_claim
  duration: 4s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis: []
  id: title_card
- title: Composition primitives
  goal: Show one of each composition kind in a non-row 2x2 grid.
  narration: Showcase composes panels, code cards, callouts, and evidence blocks in a non-row grid.
  nodes:
  - input_panel
  - ir_card
  - author_note
  - proof_block
  duration: 6s
  grammar: showcase
  edges: []
  edge_kind: flow
  emphasis:
  - ir_card
  id: primitives
- title: Fan-out
  goal: Fan one resolver service out to three artifacts.
  narration: One resolver fans out into Concrete IR, a review surface, and a build manifest.
  nodes:
  - resolver
  - concrete_ir
  - review_surface
  - build_manifest
  duration: 6s
  grammar: showcase
  edges:
  - from: resolver
    to: concrete_ir
    kind: split
  - from: resolver
    to: review_surface
    kind: split
  - from: resolver
    to: build_manifest
    kind: split
  edge_kind: flow
  emphasis:
  - concrete_ir
  id: fanout
- title: Comparison
  goal: Place two portable backend paths side by side.
  narration: 'Two portable backend paths compared side by side: HTML versus Remotion source.'
  nodes:
  - html_path
  - remotion_path
  - html_source
  - remotion_source
  duration: 6s
  grammar: showcase
  edges:
  - from: html_path
    to: html_source
    kind: compare
  - from: remotion_path
    to: remotion_source
    kind: compare
  edge_kind: flow
  emphasis: []
  id: comparison
context_items: []
notes: []
